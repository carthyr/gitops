apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: intel-gpu-dra
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: infra
  source:
    repoURL: https://github.com/carthyr/gitops
    targetRevision: HEAD
    path: apps/intel-gpu-dra/manifests
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
