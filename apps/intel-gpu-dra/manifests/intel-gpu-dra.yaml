---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: intel-gpu-dra-controller
  namespace: kube-system
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: intel-gpu-dra-kubelet-plugin
  namespace: kube-system
---
kind: ClusterRole
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: intel-gpu-dra-controller
rules:
  - apiGroups:
      - resource.k8s.io
    resources:
      - resourceclaims
      - resourceclaims/status
      - resourceclaimtemplates
      - resourceclasses
    verbs:
      - get
      - list
      - watch
      - update
      - patch
  - apiGroups:
      - ""
    resources:
      - nodes
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - ""
    resources:
      - pods
    verbs:
      - get
      - list
      - watch
---
kind: ClusterRoleBinding
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: intel-gpu-dra-controller
subjects:
  - kind: ServiceAccount
    name: intel-gpu-dra-controller
    namespace: kube-system
roleRef:
  kind: ClusterRole
  name: intel-gpu-dra-controller
  apiGroup: rbac.authorization.k8s.io
---
kind: ClusterRoleBinding
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: intel-gpu-dra-kubelet-plugin
subjects:
  - kind: ServiceAccount
    name: intel-gpu-dra-kubelet-plugin
    namespace: kube-system
roleRef:
  kind: ClusterRole
  name: intel-gpu-dra-controller
  apiGroup: rbac.authorization.k8s.io
---
# Controller Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: intel-gpu-dra-controller
  namespace: kube-system
  labels:
    app: intel-gpu-dra-controller
spec:
  replicas: 1
  selector:
    matchLabels:
      app: intel-gpu-dra-controller
  template:
    metadata:
      labels:
        app: intel-gpu-dra-controller
    spec:
      serviceAccountName: intel-gpu-dra-controller
      containers:
        - name: controller
          image: intel/intel-gpu-resource-driver:v0.6.0
          imagePullPolicy: IfNotPresent
          command:
            - /usr/bin/intel-gpu-controller
          args:
            - --v=5
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
---
# Kubelet Plugin DaemonSet
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: intel-gpu-dra-kubelet-plugin
  namespace: kube-system
  labels:
    app: intel-gpu-dra-kubelet-plugin
spec:
  selector:
    matchLabels:
      app: intel-gpu-dra-kubelet-plugin
  template:
    metadata:
      labels:
        app: intel-gpu-dra-kubelet-plugin
    spec:
      serviceAccountName: intel-gpu-dra-kubelet-plugin
      hostNetwork: true
      nodeSelector:
        kubernetes.io/os: linux
      containers:
        - name: kubelet-plugin
          image: intel/intel-gpu-resource-driver:v0.6.0
          imagePullPolicy: IfNotPresent
          command:
            - /usr/bin/intel-gpu-kubelet-plugin
          args:
            - --v=5
            - --cdi-root=/var/run/cdi
          securityContext:
            privileged: true
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          volumeMounts:
            - name: plugins-registry
              mountPath: /var/lib/kubelet/plugins_registry
            - name: plugins
              mountPath: /var/lib/kubelet/plugins
            - name: cdi
              mountPath: /var/run/cdi
            - name: dri
              mountPath: /dev/dri
              readOnly: true
      volumes:
        - name: plugins-registry
          hostPath:
            path: /var/lib/kubelet/plugins_registry
        - name: plugins
          hostPath:
            path: /var/lib/kubelet/plugins
        - name: cdi
          hostPath:
            path: /var/run/cdi
            type: DirectoryOrCreate
        - name: dri
          hostPath:
            path: /dev/dri
---
# ResourceClass pour partage GPU
apiVersion: resource.k8s.io/v1beta1
kind: ResourceClass
metadata:
  name: intel-gpu-shared
driverName: gpu.intel.com
parametersRef:
  apiGroup: gpu.resource.intel.com
  kind: GpuClassParameters
  name: shared-gpu-config
---
# Configuration de partage GPU
apiVersion: gpu.resource.intel.com/v1alpha1
kind: GpuClassParameters
metadata:
  name: shared-gpu-config
  namespace: kube-system
spec:
  shareable: true
  monitor: true
  # Permet jusqu'à 10 pods de partager un GPU
  maxConcurrentClaims: 10
