apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ollama
  namespace: argocd
  labels:
    app.kubernetes.io/managed-by: argocd-autopilot
    app.kubernetes.io/name: ollama
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: infra
  source:
    repoURL: https://otwld.github.io/ollama-helm/
    chart: ollama
    targetRevision: 1.54.0
    helm:
      values: |
        # Ollama configuration with Intel GPU support
        ollama:
          gpu:
            enabled: true
            type: "intel"
            number: 1
        
        # Resources with GPU allocation
        resources:
          requests:
            cpu: 500m
            memory: 4Gi
          limits:
            cpu: 4000m
            memory: 16Gi
            gpu.intel.com/i915: 1
        
        # Extra environment variables for Intel GPU
        extraEnv:
          - name: OLLAMA_INTEL_GPU
            value: "1"
          - name: OLLAMA_NUM_GPU
            value: "1"
        
        # Mount Intel GPU devices
        extraVolumes:
          - name: dri-devices
            hostPath:
              path: /dev/dri
        
        extraVolumeMounts:
          - name: dri-devices
            mountPath: /dev/dri
        
        # Persistence for models storage
        persistentVolume:
          enabled: true
          size: 100Gi
          storageClass: "microk8s-hostpath"
          accessModes:
            - ReadWriteOnce
        
        # Service configuration
        service:
          type: ClusterIP
          port: 11434
          annotations: {}
        
        # Ingress disabled (we'll use HTTPRoute)
        ingress:
          enabled: false
        
        # Pod security context (adjusted for GPU access)
        podSecurityContext:
          runAsUser: 0
          runAsGroup: 0
          fsGroup: 0
        
        # Container security context for privileged GPU access
        containerSecurityContext:
          privileged: true
          capabilities:
            add:
              - SYS_ADMIN
  
  destination:
    server: https://kubernetes.default.svc
    namespace: ollama
  
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
