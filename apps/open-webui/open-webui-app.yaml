apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: open-webui
  namespace: argocd
  labels:
    app.kubernetes.io/managed-by: argocd-autopilot
    app.kubernetes.io/name: open-webui
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: infra
  source:
    repoURL: https://helm.openwebui.com/
    chart: open-webui
    targetRevision: 3.1.8
    helm:
      values: |
        # Open WebUI configuration for Ollama
        ollama:
          enabled: false
          # Use external Ollama instance
          urls:
            - http://ollama.ollama.svc.cluster.local:11434
        
        # Persistent storage for chat history and settings
        persistence:
          enabled: true
          size: 10Gi
          storageClass: "microk8s-hostpath"
          accessModes:
            - ReadWriteOnce
        
        # Resources
        resources:
          requests:
            cpu: 200m
            memory: 512Mi
          limits:
            cpu: 1000m
            memory: 2Gi
        
        # Service configuration
        service:
          type: ClusterIP
          port: 8080
          annotations: {}
        
        # Ingress disabled (we'll use HTTPRoute)
        ingress:
          enabled: false
        
        # Environment variables
        extraEnvVars:
          - name: OLLAMA_BASE_URL
            value: "http://ollama.ollama.svc.cluster.local:11434"
          - name: WEBUI_AUTH
            value: "true"
          - name: WEBUI_NAME
            value: "Technovise Chat"
        
        # Replica count
        replicaCount: 1
  
  destination:
    server: https://kubernetes.default.svc
    namespace: open-webui
  
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
