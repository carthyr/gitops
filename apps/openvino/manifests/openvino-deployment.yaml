---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: openvino-models
  namespace: openvino
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: microk8s-hostpath
  resources:
    requests:
      storage: 50Gi
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: openvino-notebook
  namespace: openvino
data:
  llava-demo.py: |
    """
    OpenVINO LLaVA Multimodal Chatbot Demo
    Optimized for Intel Arrow Lake-P GPU
    """
    import openvino as ov
    import openvino_genai as ov_genai
    from pathlib import Path
    import requests
    from PIL import Image
    from io import BytesIO
    
    # Configuration for Intel GPU
    DEVICE = "GPU"  # Intel Arrow Lake-P
    MODEL_PATH = Path("/models/llava-1.5-7b-hf")
    
    def setup_openvino():
        """Initialize OpenVINO with GPU optimization"""
        core = ov.Core()
        
        # List available devices
        print("Available devices:", core.available_devices)
        
        # GPU-specific optimizations
        config = {
            "PERFORMANCE_HINT": "LATENCY",
            "NUM_STREAMS": "1",
            "INFERENCE_PRECISION_HINT": "f16"  # FP16 for GPU
        }
        
        return core, config
    
    def run_llava_inference(image_url: str, prompt: str):
        """Run LLaVA inference with image"""
        core, config = setup_openvino()
        
        # Load image
        response = requests.get(image_url)
        image = Image.open(BytesIO(response.content))
        
        # Load model
        pipe = ov_genai.VLMPipeline(str(MODEL_PATH), device=DEVICE, **config)
        
        # Generate response
        full_prompt = f"USER: <image>\n{prompt}\nASSISTANT:"
        
        result = pipe.generate(
            full_prompt,
            image=image,
            max_new_tokens=100,
            do_sample=False
        )
        
        return result
    
    if __name__ == "__main__":
        # Demo
        image_url = "https://storage.openvinotoolkit.org/repositories/openvino_notebooks/data/data/image/coco.jpg"
        prompt = "What is unusual about this image?"
        
        print("🚀 Running LLaVA on Intel GPU...")
        response = run_llava_inference(image_url, prompt)
        print(f"\n📝 Response: {response}")
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: openvino
  namespace: openvino
  labels:
    app: openvino
spec:
  replicas: 1
  selector:
    matchLabels:
      app: openvino
  template:
    metadata:
      labels:
        app: openvino
    spec:
      containers:
        - name: openvino
          image: openvino/ubuntu22_runtime:2026.1.0
          command: ["/bin/bash", "-c"]
          args:
            - |
              # Install dependencies
              apt-get update && apt-get install -y python3-pip git curl
              pip3 install --upgrade pip
              pip3 install openvino-genai optimum-intel[openvino] transformers pillow requests jupyter
              
              # Download LLaVA model (INT8 quantized for GPU)
              echo "📦 Downloading LLaVA model..."
              optimum-cli export openvino \
                --model llava-hf/llava-1.5-7b-hf \
                --task image-text-to-text \
                --weight-format int8 \
                /models/llava-1.5-7b-hf
              
              # Start Jupyter server
              echo "🚀 Starting Jupyter server on port 8888..."
              jupyter notebook \
                --ip=0.0.0.0 \
                --port=8888 \
                --no-browser \
                --allow-root \
                --NotebookApp.token='' \
                --NotebookApp.password=''
          ports:
            - name: jupyter
              containerPort: 8888
              protocol: TCP
            - name: api
              containerPort: 8000
              protocol: TCP
          resources:
            requests:
              cpu: 1000m
              memory: 8Gi
              gpu.intel.com/i915: 1
            limits:
              cpu: 4000m
              memory: 16Gi
              gpu.intel.com/i915: 1
          volumeMounts:
            - name: models
              mountPath: /models
            - name: notebook
              mountPath: /workspace/llava-demo.py
              subPath: llava-demo.py
            - name: dri-devices
              mountPath: /dev/dri
          env:
            - name: OPENVINO_DEVICE
              value: "GPU"
            - name: OPENVINO_LOG_LEVEL
              value: "2"
          securityContext:
            privileged: true
      volumes:
        - name: models
          persistentVolumeClaim:
            claimName: openvino-models
        - name: notebook
          configMap:
            name: openvino-notebook
        - name: dri-devices
          hostPath:
            path: /dev/dri
---
apiVersion: v1
kind: Service
metadata:
  name: openvino
  namespace: openvino
spec:
  type: ClusterIP
  ports:
    - name: jupyter
      port: 8888
      targetPort: 8888
      protocol: TCP
    - name: api
      port: 8000
      targetPort: 8000
      protocol: TCP
  selector:
    app: openvino
