apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: openvino
  namespace: openvino
spec:
  parentRefs:
    - name: technovise-gateway
      namespace: gateway-api
  hostnames:
    - "openvino.technovise.local"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: openvino
          port: 8888
